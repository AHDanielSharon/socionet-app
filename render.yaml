# render.yaml — SOCIONET Blueprint
# Defines all services for one-click deploy on Render
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── API Backend
  - type: web
    name: socionet-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: socionet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: socionet-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: USE_CLOUDINARY
        value: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: BCRYPT_ROUNDS
        value: 12
      - key: CORS_ORIGINS
        sync: false

  # ── Realtime Server
  - type: web
    name: socionet-realtime
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/realtime
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REALTIME_PORT
        value: 4001
      - key: REDIS_URL
        fromService:
          name: socionet-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: socionet-api
          type: web
          envVarKey: JWT_SECRET
      - key: APP_URL
        sync: false

  # ── Next.js Frontend
  - type: web
    name: socionet-web
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_REALTIME_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false

  # ── Background Worker
  - type: worker
    name: socionet-worker
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: socionet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: socionet-redis
          type: redis
          property: connectionString

databases:
  # ── PostgreSQL
  - name: socionet-db
    databaseName: socionet
    user: socionet
    region: oregon
    plan: free

  # ── Redis (Key Value)
  - name: socionet-redis
    type: redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
